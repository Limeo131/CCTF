<!DOCTYPE html>
<html class="light" lang="en" style="">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>CCTF | 芝加哥中国戏剧节</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7BC1E4",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "on-surface-variant": "#40484d",
                    },
                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Manrope"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body">

    <nav class="sticky top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
        <div class="flex justify-between items-center px-12 py-8 max-w-screen-2xl mx-auto">
            <div class="text-xl font-bold">CCTF Logo</div>
            <div class="hidden md:flex items-center gap-10">
                <a class="text-primary font-semibold" href="#">Home | 首页</a>
                <a class="text-slate-600 hover:text-primary" href="#">Programs | 节目</a>
            </div>
            <a class="bg-primary text-white px-8 py-3 rounded-md font-bold" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">Tickets | 购票</a>
        </div>
    </nav>

    <main>
        <section class="relative min-h-[85vh] flex items-center bg-white pt-10">
            <div class="container mx-auto px-8 grid lg:grid-cols-2 gap-12 items-center">
                <div>
                    <h1 class="text-6xl md:text-8xl font-extrabold text-slate-900 mb-6">
                        Chicago Chinese Theatre Festival
                        <span class="block text-primary mt-4">芝加哥中文戏剧节</span>
                    </h1>
                    <div class="flex flex-wrap gap-4">
                        <button class="bg-primary text-white px-10 py-4 rounded-md font-bold text-lg hover:shadow-xl transition-all" onclick="window.open('https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png', '_blank')">
                            View Program | 节目单
                        </button>
                        <a class="bg-white text-primary border border-primary px-10 py-4 rounded-md font-bold text-lg" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">Tickets | 购票</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-24 bg-surface">
            <div class="container mx-auto px-8">
                <div class="space-y-12">
                    <div class="flex flex-col md:flex-row gap-12">
                        <div class="md:w-2/3">
                            <h3 class="text-3xl font-bold mb-2">A Doll's House | 《玩偶之家》</h3>
                            <a class="text-primary font-bold hover:underline" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">Learn More | 了解更多</a>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row gap-12">
                        <div class="md:w-2/3">
                            <h3 class="text-3xl font-bold mb-2">An Act of Grace | 《杀了我》</h3>
                            <a class="text-primary font-bold hover:underline" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">Learn More | 了解更多</a>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-3 gap-8">
                        <div class="bg-white p-6 rounded-xl border-t-4 border-primary">
                            <h4 class="text-xl font-bold">No Exit | 《禁闭》</h4>
                            <a class="text-primary font-bold text-sm" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">RSVP | 预约</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="py-24 bg-slate-900 text-white">
            <div class="container mx-auto px-8 text-center max-w-4xl">
                <a class="bg-primary text-white px-10 py-4 rounded-md font-bold" href="https://raw.githubusercontent.com/Limeo131/CCTF/main/pictures/ticket.png" target="_blank" rel="noopener noreferrer">Buy Tickets | 购票指南</a>
            </div>
        </section>
    </main>

</body>
</html>
